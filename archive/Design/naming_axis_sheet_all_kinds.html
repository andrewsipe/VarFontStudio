<div style="min-height:600px;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;padding:24px 0;font-family:-apple-system,sans-serif;">
<div style="width:540px;background:#1e1e1e;border-radius:12px;border:0.5px solid #3a3a3a;padding:20px 22px;color:#e8e8e6;">
<div style="font-size:16px;font-weight:500;margin-bottom:4px;">Add naming axis</div>
<div style="font-size:12px;color:#9a9a96;line-height:1.5;margin-bottom:14px;">Naming axes label styles across files without joining the instance grid — no fvar scale, one stop per file.</div>

<div style="font-size:11px;color:#8a8a86;margin-bottom:6px;">Kind</div>
<div id="tabs" style="display:flex;gap:6px;margin-bottom:6px;"></div>
<div id="disabledNote" style="font-size:11px;color:#726f68;margin-bottom:16px;min-height:14px;"></div>

<div id="fields" style="display:flex;gap:10px;margin-bottom:14px;"></div>

<div id="policyBox" style="border-radius:8px;padding:10px 12px;font-size:12px;line-height:1.6;margin-bottom:16px;"></div>

<div style="font-size:11px;color:#8a8a86;margin-bottom:6px;">Axis tree preview</div>
<div id="preview" style="border:0.5px solid #333;border-radius:8px;padding:10px 12px;background:#161615;min-height:56px;"></div>
</div>
</div>
<script>
var kinds = {
  ital: {
    label: "Slope (ital)", enabled: false,
    reason: "ital already exists as a naming axis in this tree — adding it again would duplicate the tag.",
    policyTitle: "Slope policy",
    policy: "One Format 3 stop per file: Roman 0\u21921 on upright files, Italic 1\u21920 on italic files. This tag is already spoken for by the Italic axis shown above.",
    previewEmpty: "Already exists — see Italic in the Axis Tree."
  },
  wdth: {
    label: "Width (wdth)", enabled: false,
    reason: "Width already exists as an instance axis (fvar wdth 80\u2013120) — a naming axis with the same tag would collide.",
    policyTitle: "Width policy",
    policy: "Adds wdth as a naming axis only when Width isn't already an instance axis. Here it already is, so this kind stays off.",
    previewEmpty: "Already exists as an instance axis (fvar wdth 80\u2013120)."
  },
  opsz: {
    label: "Optical (opsz)", enabled: true,
    tag: "opsz", tagLocked: true, name: "Display", value: "18",
    policyTitle: "Optical policy",
    policy: "Adds opsz as a naming axis only when Optical Size isn't already an instance axis. Uses an ordinary named stop, not a 0/1 linked pair — pick the value that best describes this file.",
    fmt: "F1", code: "1", linked: false
  },
  custom: {
    label: "Custom tag", enabled: true,
    tag: "GRAD", tagLocked: false, name: "Grade", value: "0",
    policyTitle: "Custom tag policy",
    policy: "Must be exactly 4 characters. Uppercase reads as a registered-style tag; lowercase signals private-use. GRAD isn't a registered OpenType axis, so this is safe as a private naming axis — but check it doesn't collide with a tag another file in this family already uses.",
    fmt: "F3", code: "1", linked: true, linkedTo: "1"
  }
};
var active = "custom";

function render(){
  var tabsEl = document.getElementById("tabs");
  tabsEl.innerHTML = "";
  Object.keys(kinds).forEach(function(k){
    var d = kinds[k];
    var el = document.createElement("div");
    el.textContent = d.label;
    el.style.flex = "1";
    el.style.textAlign = "center";
    el.style.padding = "8px 0";
    el.style.borderRadius = "6px";
    el.style.fontSize = "12px";
    if(!d.enabled){
      el.style.border = "0.5px solid #333";
      el.style.background = "#242422";
      el.style.color = "#5a5a56";
      el.style.cursor = "not-allowed";
      el.title = d.reason;
    } else if(k === active){
      el.style.border = "1px solid #a78bfa";
      el.style.background = "#2d2740";
      el.style.color = "#d8cffa";
      el.style.fontWeight = "500";
      el.style.cursor = "pointer";
    } else {
      el.style.border = "0.5px solid #3a3a3a";
      el.style.background = "#242422";
      el.style.color = "#c9c9c5";
      el.style.cursor = "pointer";
      el.onclick = function(){ active = k; render(); };
    }
    tabsEl.appendChild(el);
  });

  var d = kinds[active];
  document.getElementById("disabledNote").innerHTML = !d.enabled
    ? '<i class="ti ti-lock" style="font-size:12px;vertical-align:-1px;margin-right:4px;" aria-hidden="true"></i>' + d.reason
    : "";

  var fieldsEl = document.getElementById("fields");
  if(!d.enabled){
    fieldsEl.innerHTML = '<div style="flex:1;font-size:12px;color:#5a5a56;padding:8px 0;">Select an available kind to configure a tag and name.</div>';
  } else {
    fieldsEl.innerHTML =
      '<input value="' + d.tag + '" ' + (d.tagLocked ? 'disabled' : '') + ' placeholder="Tag" style="flex:1;background:#141413;border:0.5px solid #3a3a3a;border-radius:6px;padding:8px 10px;color:' + (d.tagLocked ? '#726f68' : '#e8e8e6') + ';font-size:13px;">' +
      '<input value="' + d.name + '" placeholder="Display name" style="flex:1;background:#141413;border:0.5px solid #3a3a3a;border-radius:6px;padding:8px 10px;color:#e8e8e6;font-size:13px;">' +
      '<input value="' + d.value + '" placeholder="Value" style="width:70px;background:#141413;border:0.5px solid #3a3a3a;border-radius:6px;padding:8px 10px;color:#e8e8e6;font-size:13px;">';
  }

  var policyEl = document.getElementById("policyBox");
  policyEl.style.background = d.enabled ? "#241d2e" : "#201f1d";
  policyEl.style.border = "0.5px solid " + (d.enabled ? "#4c3d66" : "#3a3a3a");
  policyEl.style.color = d.enabled ? "#c9bce0" : "#8a8a86";
  policyEl.innerHTML = '<div style="font-weight:500;margin-bottom:2px;color:' + (d.enabled ? "#e2d6f5" : "#a3a39e") + ';">' + d.policyTitle + '</div>' + d.policy;

  var previewEl = document.getElementById("preview");
  if(!d.enabled){
    previewEl.innerHTML = '<div style="font-size:12px;color:#5a5a56;">' + d.previewEmpty + '</div>';
  } else {
    var nameCell = d.name + (d.linked ? " &middot; linked to " + d.linkedTo : "");
    previewEl.innerHTML =
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">' +
        '<span style="background:#4c3d66;color:#d8cffa;font-size:10px;font-weight:500;padding:2px 6px;border-radius:4px;">N</span>' +
        '<span style="font-weight:500;font-size:13px;">' + d.name + '</span>' +
        '<span style="font-size:11px;color:#726f68;">No fvar scale &middot; this file</span>' +
      '</div>' +
      '<div style="display:grid;grid-template-columns:36px 1fr 40px 1fr 50px;gap:6px;font-size:11px;color:#726f68;padding:4px 0 2px;">' +
        '<span>Fmt</span><span>Value</span><span>Code</span><span>Name</span><span>Elid</span>' +
      '</div>' +
      '<div style="display:grid;grid-template-columns:36px 1fr 40px 1fr 50px;gap:6px;font-size:12px;align-items:center;">' +
        '<span style="background:#2a3d24;color:#8fd16a;font-size:10px;font-weight:500;padding:1px 5px;border-radius:4px;width:fit-content;">' + d.fmt + '</span>' +
        '<span style="color:#e0a95a;">' + d.value + '</span>' +
        '<span style="color:#e0a95a;">' + d.code + '</span>' +
        '<span>' + nameCell + '</span>' +
        '<span style="color:#5a5a56;">&#9711;</span>' +
      '</div>';
  }
}
render();
</script>

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch_label: arm64
          - runner: macos-15-intel
            arch_label: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -euo pipefail
          if [[ -d /Applications/Xcode.app/Contents/Developer ]]; then
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          else
            candidate="$(ls -d /Applications/Xcode_16*.app/Contents/Developer 2>/dev/null | sort -V | tail -1 || true)"
            if [[ -z "${candidate}" ]]; then
              echo "error: no usable Xcode developer directory found" >&2
              ls /Applications | head -50 >&2 || true
              exit 1
            fi
            sudo xcode-select -s "$candidate"
          fi
          xcode-select -p
          xcodebuild -version
          swift --version

      - name: Build release zip (${{ matrix.arch_label }})
        run: |
          set -euo pipefail
          uname -m
          chmod +x scripts/build-release.sh scripts/bundle-python-runtime.sh
          ./scripts/build-release.sh --skip-tests
          echo "Built on $(uname -m):"
          ls -la dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VarFontStudio-${{ matrix.arch_label }}
          path: dist/*.zip
          if-no-files-found: error

  publish-release:
    needs: build-macos
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download release zips
        uses: actions/download-artifact@v4
        with:
          pattern: VarFontStudio-*
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
          body: |
            ## Requirements

            - **macOS 14 (Sonoma) or later**
            - Download the zip that matches your Mac chip

            | File | Mac |
            |------|-----|
            | `…-macOS14+-Apple-Silicon.zip` | Apple Silicon (M1, M2, M3, …) |
            | `…-macOS14+-Intel.zip` | Intel |

            ## Install

            1. Unzip the folder.
            2. Drag **VarFontStudio.app** into Applications.
            3. Double-click **Allow First Launch** (clears download quarantine — required for this ad-hoc alpha).
               If macOS blocks the helper: Control-click it → **Open**, or drag the `.command` into Terminal.
               The script prints what it does (quarantine clear + open); it does not modify fonts.

            Recent macOS often shows only **Done** / **Move to Trash** when opening the app (no Open Anyway in that dialog). The helper is the easy path; see the [README](https://github.com/andrewsipe/VarFontStudio#install-no-xcode-required) for System Settings / Terminal alternatives.

            ## What’s new in this alpha

            - **Naming axes:** Slope / Width / Optical / custom file identity lives on design-record axes (with optional stop **Code** when Code naming is on). Add Naming Axis no longer copies a stop onto every sibling file.
            - **Export Review:** project naming order drives Review; naming-axis registration stops show in STAT; leftover clarifier auto-append removed from vfcommit.
            - **Export All:** choosing the source folder creates a `{project} Patched` subfolder instead of silently failing; Review closes on success with a progress bar + status while writing.
            - **Export UI:** clearer **Export All…** / **Export This File…** actions; exported file chips use a checkmark export badge and destination folder label.
            - **STAT write path:** newly added naming-axis tags are ensured into DesignAxisRecord on export (not only reordered).
            - **Allow First Launch helper** in each release zip — clears Gatekeeper quarantine without a Developer ID / notarization.
            - **Save vs Export:** **Save** (⌘S) writes the `.varf` project; **Export…** (⌘E) writes patched fonts.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch_label: arm64
          - runner: macos-15-intel
            arch_label: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build release zip (${{ matrix.arch_label }})
        run: |
          swift --version
          xcodebuild -version
          uname -m
          chmod +x scripts/build-release.sh scripts/bundle-python-runtime.sh
          ./scripts/build-release.sh --skip-tests
          echo "Built on $(uname -m):"
          ls -la dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VarFontStudio-${{ matrix.arch_label }}
          path: dist/*.zip
          if-no-files-found: error

  publish-release:
    needs: build-macos
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download release zips
        uses: actions/download-artifact@v4
        with:
          pattern: VarFontStudio-*
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
          body: |
            ## Requirements

            - **macOS 14 (Sonoma) or later**
            - Download the zip that matches your Mac chip

            | File | Mac |
            |------|-----|
            | `…-macOS14+-Apple-Silicon.zip` | Apple Silicon (M1, M2, M3, …) |
            | `…-macOS14+-Intel.zip` | Intel |

            ## Install

            1. Unzip the folder.
            2. Drag **VarFontStudio.app** into Applications.
            3. Double-click **Allow First Launch** (clears download quarantine — required for this ad-hoc alpha).
               If macOS blocks the helper: Control-click it → **Open**.

            Recent macOS often shows only **Done** / **Move to Trash** when opening the app (no Open Anyway in that dialog). The helper is the easy path; see the [README](https://github.com/andrewsipe/VarFontStudio#install-no-xcode-required) for System Settings / Terminal alternatives.

            ## What’s new in this alpha

            - **Allow First Launch helper** in each release zip — clears Gatekeeper quarantine without a Developer ID / notarization.
            - **Save vs Export:** **Save** (⌘S) writes the `.varf` project; **Export…** (⌘E) writes patched fonts. Multi-file projects can **Export All…** into a folder with original filenames.
            - **Review:** The preflight window is **Review** (⌘⇧R). JSON “save plan” dump removed from the chrome.
            - **Safer single Export…:** defaults to a `-patched` name beside the source; macOS warns if the name already exists.
            - **Quit:** only prompts for unsaved **project** files — unexported font edits no longer block exit.
            - **Drop `.varf`:** empty workspace accepts project files (opens at the real path so relative fonts resolve correctly).
            - Copy and inclusion labels aligned (**Export inclusion**, shortcuts help, empty-state hint).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

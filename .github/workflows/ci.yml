name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Swift tests
        run: |
          swift --version
          xcodebuild -version
          swift test

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python vfcommit tests
        working-directory: Tools/vfcommit
        run: |
          python --version
          python -m pip install -r requirements.txt pytest
          # Live font files are not in the repo; integration tests skip when missing.
          python -m pytest tests -q --tb=short

name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -euo pipefail
          # Prefer the default Xcode.app symlink; fall back to newest 16.x toolchain.
          if [[ -d /Applications/Xcode.app/Contents/Developer ]]; then
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          else
            candidate="$(ls -d /Applications/Xcode_16*.app/Contents/Developer 2>/dev/null | sort -V | tail -1 || true)"
            if [[ -z "${candidate}" ]]; then
              echo "error: no usable Xcode developer directory found" >&2
              ls /Applications | head -50 >&2 || true
              exit 1
            fi
            sudo xcode-select -s "$candidate"
          fi
          xcode-select -p
          xcodebuild -version
          swift --version

      - name: Swift tests
        run: |
          set -euo pipefail
          swift test

      - name: App store tests
        working-directory: Apps/VarFontStudio
        run: |
          set -euo pipefail
          xcodebuild test \
            -scheme VarFontStudio \
            -destination 'platform=macOS' \
            -only-testing:VarFontStudioTests \
            CODE_SIGNING_ALLOWED=NO

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python vfcommit tests
        working-directory: Tools/vfcommit
        run: |
          set -euo pipefail
          python --version
          python -m pip install -r requirements.txt pytest
          # Live font files are not in the repo; integration tests skip when missing.
          python -m pytest tests -q --tb=short
